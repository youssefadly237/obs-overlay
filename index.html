<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    @import "./src/theme.css";

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "JetBrains Mono", monospace;
      background: var(--base);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    h1 {
      font-size: 28px;
      color: var(--mauve);
      margin-bottom: 8px;
    }

    .tagline {
      color: var(--overlay1);
      font-size: 14px;
      margin-bottom: 48px;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 720px;
      width: 100%;
    }

    .nav-card {
      background: var(--surface0);
      border: 1px solid var(--surface1);
      border-radius: 1rem;
      padding: 28px 24px;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-card:hover {
      transform: translateY(-4px);
      border-color: var(--mauve);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .nav-card .icon {
      font-size: 28px;
    }

    .nav-card .label {
      font-weight: 700;
      font-size: 16px;
      color: var(--mauve);
    }

    .nav-card .desc {
      font-size: 12px;
      color: var(--overlay1);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Learning Overlay</h1>
  <p class="tagline">Streaming overlay system - pick a page to get started</p>

  <nav class="nav-grid">
    <a class="nav-card" href="/overlay/">
      <span class="icon">🎬</span>
      <span class="label">Overlay</span>
      <span class="desc">The OBS browser-source overlay rendered at 1920×1080.</span>
    </a>

    <a class="nav-card" href="/controls/">
      <span class="icon">🎛️</span>
      <span class="label">Controls</span>
      <span class="desc">Control panel to trigger overlays and view request logs.</span>
    </a>

    <a class="nav-card" href="/api/">
      <span class="icon">📡</span>
      <span class="label">API Docs</span>
      <span class="desc">Interactive API documentation.</span>
    </a>
  </nav>
</body>
</html>
